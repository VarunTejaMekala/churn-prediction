<!DOCTYPE html>

<html>
<head>
<title>Customer Churn Prediction</title>

<style>

body{
    background:#0b0f14;
    color:#00c97a;
    font-family:Segoe UI, Arial;
    margin:0;
    padding:0;
}

/* Title */

h1{
    text-align:center;
    margin-top:30px;
    color:#00c97a;
}

/* Main container */

.container{
    width:900px;
    margin:40px auto;
    background:#111821;
    padding:40px;
    border-radius:8px;
}

/* Rows */

.row{
    display:flex;
    align-items:center;
    margin-bottom:20px;
}

.row label{
    width:35%;
    text-align:left;
    font-size:16px;
}

.row input,
.row select{
    width:65%;
    padding:10px;
    background:#0b0f14;
    border:1px solid #00c97a;
    color:#00c97a;
    border-radius:4px;
}

/* Checkbox row */

.checkbox-group{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.checkbox-group label{
    font-size:15px;
}

/* Button */

button{
    width:100%;
    padding:12px;
    background:#1f7a43;
    border:none;
    color:white;
    font-size:16px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#2ca65e;
}

/* Prediction result */

.result{
    margin-top:30px;
    padding:20px;
    background:#0b0f14;
    border-radius:6px;
    text-align:center;
    color:#4ea1ff;
    font-size:22px;
}

</style>

</head>

<body>

<h1>Customer Churn Prediction System</h1>

<div class="container">

<form action="/predict" method="POST">

<h3 style="color:white">Customer Information</h3>

<div class="row">
<label>Gender</label>
<select name="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="checkbox-group">
<label>Senior Citizen <input type="checkbox" name="SeniorCitizen"></label>
<label>Partner <input type="checkbox" name="Partner"></label>
<label>Dependents <input type="checkbox" name="Dependents"></label>
</div>

<div class="row">
<label>Tenure (Months)</label>
<input type="number" name="Tenure" required>
</div>

<div class="row">
<label>Monthly Charges</label>
<input type="number" step="0.01" name="MonthlyCharges" required>
</div>

<div class="row">
<label>Internet Service</label>
<select name="InternetService">
<option value="DSL">DSL</option>
<option value="Fiber optic">Fiber optic</option>
<option value="No">No</option>
</select>
</div>

<div class="row">
<label>Contract</label>
<select name="Contract">
<option value="Month-to-month">Month-to-month</option>
<option value="One year">One year</option>
<option value="Two year">Two year</option>
</select>
</div>

<div class="row">
<label>Payment Method</label>
<select name="PaymentMethod">
<option value="Electronic check">Electronic check</option>
<option value="Mailed check">Mailed check</option>
<option value="Bank transfer (automatic)">Bank transfer</option>
<option value="Credit card (automatic)">Credit card</option>
</select>
</div>

<button type="submit">Predict Churn</button>

</form>

{% if prediction_text %}

<div class="result">
<h2>{{ prediction_text }}</h2>
</div>

{% endif %}

</div>

</body>
</html>
