<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>AI Customer Churn Prediction</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
height:100vh;
background: linear-gradient(135deg,#667eea,#764ba2);
font-family: 'Segoe UI', sans-serif;
color:white;
}

.dashboard{
margin-top:40px;
padding:30px;
border-radius:20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.title{
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:30px;
opacity:0.8;
}

.section-title{
margin-top:25px;
margin-bottom:10px;
font-weight:bold;
}

input,select{
border-radius:10px !important;
}

.checkbox-grid{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:10px;
margin-bottom:10px;
}

.predict-btn{
background: linear-gradient(45deg,#ff512f,#dd2476);
border:none;
padding:12px 35px;
font-size:18px;
border-radius:10px;
color:white;
transition:0.3s;
}

.predict-btn:hover{
transform:scale(1.1);
}

.result{
background:rgba(255,255,255,0.15);
padding:20px;
margin-top:25px;
border-radius:15px;
text-align:center;
font-size:22px;
}

.graphs{
margin-top:30px;
}

.graphs img{
width:100%;
max-width:700px;
border-radius:15px;
margin-top:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<div class="container">

<div class="dashboard">

<h2 class="title">AI Customer Churn Prediction</h2>
<p class="subtitle">Predict telecom customer churn using Machine Learning</p>

<form action="{{ url_for('predict')}}" method="post">

<h5 class="section-title">Customer Information</h5>

<div class="checkbox-grid">

<label><input type="checkbox" name="SeniorCitizen"> Senior Citizen</label> <label><input type="checkbox" name="Partner"> Partner</label> <label><input type="checkbox" name="Dependents"> Dependents</label> <label><input type="checkbox" name="PaperlessBilling"> Paperless Billing</label> <label><input type="checkbox" name="PhoneService"> Phone Service</label> <label><input type="checkbox" name="MultipleLines"> Multiple Lines</label>

</div>

<h5 class="section-title">Online Services</h5>

<div class="checkbox-grid">

<label><input type="checkbox" name="OnlineSecurity"> Online Security</label> <label><input type="checkbox" name="OnlineBackup"> Online Backup</label> <label><input type="checkbox" name="DeviceProtection"> Device Protection</label> <label><input type="checkbox" name="TechSupport"> Tech Support</label> <label><input type="checkbox" name="StreamingTV"> Streaming TV</label> <label><input type="checkbox" name="StreamingMovies"> Streaming Movies</label>

</div>

<div class="row">

<div class="col-md-3">
<label>Gender</label>
<select name="gender" class="form-control">
<option value=0>Male</option>
<option value=1>Female</option>
</select>
</div>

<div class="col-md-3">
<label>Internet Service</label>
<select name="InternetService" class="form-control">
<option value=0>No Internet</option>
<option value=1>DSL</option>
<option value=2>Fiber optic</option>
</select>
</div>

<div class="col-md-3">
<label>Contract</label>
<select name="Contract" class="form-control">
<option value=0>Month-to-Month</option>
<option value=1>One Year</option>
<option value=2>Two Year</option>
</select>
</div>

<div class="col-md-3">
<label>Payment Method</label>
<select name="PaymentMethod" class="form-control">
<option value=0>Bank Transfer</option>
<option value=1>Credit Card</option>
<option value=2>Electronic Check</option>
<option value=3>Mailed Check</option>
</select>
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label>Monthly Charges</label>
<input type="number" name="MonthlyCharges" class="form-control" required>
</div>

<div class="col-md-6">
<label>Tenure (Months)</label>
<input type="number" name="Tenure" class="form-control" required>
</div>

</div>

<br>

<div class="text-center">

<button type="submit" class="predict-btn">Predict Churn</button>

</div>

</form>

{% if prediction_text %}

<div class="result">

{{ prediction_text }}

</div>

<div class="graphs">
    
<h5>Feature Impact (SHAP)</h5>
<img src="data:image/png;base64,{{url_2}}" onerror="this.style.display='none'">

</div>

{% endif %}

</div>

</div>

</body>
</html>
